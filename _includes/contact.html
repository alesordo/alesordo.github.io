<script src="https://challenges.cloudflare.com/turnstile/v0/api.js?render=explicit&onload=onTurnstileLoad"
    defer></script>
<script src="{{ '/assets/js/contact.js' | relative_url }}"></script>

<section>
    <h4 class="font-weight-bold text-center">Contact form</h4>
    <p class="text-muted text-center">I'll reply as soon as possible</p>
    <!-- TODO: change -->
    <form id="contact-form" class="needs-validation col-md-8 col-sm-10 container-fluid" role="form"
        data-endpoint="http://localhost:8080/api/v1/contact/messages"
        data-method="POST" data-success-url="/thanks" data-failure-url="/failed" novalidate>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-group">
                    <input type="text" name="name" class="form-control" placeholder="Name" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-group">
                    <input type="email" name="email" class="form-control" placeholder="Email" required>
                </div>
            </div>
            <div class="address"><input name="address" type="text" autocomplete="new-address" tabindex="-1" value="" />
            </div>
            <div class="col-md-12">
                <div class="form-group">
                    <input name="subject" class="form-control" placeholder="Subject" required>
                </div>
            </div>
            <div class="col-12">
                <div class="form-group">
                    <textarea class="form-control rounded" rows="8" name="message" placeholder="Message..."
                        required></textarea>
                </div>
            </div>
            <div class="col-12" id="turnstile-widget"></div>
            <div class="col-12 mt-3">
                <button class="btn btn-danger" type="submit" name="submit" disabled>Send</button>
            </div>
        </div>
    </form>
</section>
